<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>QR Scanner Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>QR Scanner Pro</h1>
            <div class="subtitle">Point camera at QR code</div>
        </header>

        <main class="scanner-container">
            <div id="reader"></div>
            
            <div class="scanner-overlay" id="scannerOverlay">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
                <div class="scan-line"></div>
            </div>

            <div class="top-controls">
                <button class="top-btn" id="historyBtn" onclick="toggleHistory()" aria-label="Show Scan History">
                    📋
                    <span class="history-badge" id="scanCount" style="display: none;">0</span>
                </button>
            </div>

            <div class="permission-denied" id="permissionDenied">
                <div class="permission-icon">📷</div>
                <h3 style="margin-bottom: 10px;">Camera Access Required</h3>
                <p style="color: #888; font-size: 0.9rem; line-height: 1.4;">Please allow camera access to scan QR codes</p>
                <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 20px; width: 100%;">Retry</button>
            </div>
        </main>

        <footer class="controls">
            <button class="btn btn-primary" onclick="toggleScanning()" id="scanBtn" aria-label="Toggle Scanning">
                <span id="scanBtnText">⏸ Pause</span>
            </button>
            <button class="btn" onclick="document.getElementById('fileInput').click()" aria-label="Open Gallery to scan image">
                📁 Gallery
            </button>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
        </footer>
    </div>

    <div class="result-panel" id="resultPanel">
        <div class="result-header">
            <div class="result-title">✅ Code Detected</div>
            <button class="close-btn" onclick="closeResult()" aria-label="Close Result">×</button>
        </div>
        <div class="result-content" id="resultContent"></div>
        <div class="action-buttons">
            <button class="action-btn copy" onclick="copyResult()">📋 Copy</button>
            <button class="action-btn open" onclick="openResult()">🔗 Open</button>
            <button class="action-btn share" onclick="shareResult()" style="grid-column: span 2;">📤 Share</button>
        </div>
    </div>

    <div class="overlay-backdrop" id="backdrop" onclick="closeAllPanels()"></div>

    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h2 style="font-size: 1.1rem;">Scan History</h2>
            <button class="close-btn" onclick="toggleHistory()" aria-label="Close History">×</button>
        </div>
        <div id="historyList"></div>
        <button class="btn" onclick="clearHistory()" style="margin-top: 15px; width: 100%;">Clear All</button>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
