<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
        }

        .scanner-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #reader {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Custom overlay */
        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .scanner-overlay::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 20px;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            opacity: 0;
            animation: scanPulse 2s infinite;
            z-index: -1;
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #00d4ff;
            border-style: solid;
            border-width: 0;
        }

        .corner.top-left {
            top: -2px;
            left: -2px;
            border-top-width: 4px;
            border-left-width: 4px;
            border-top-left-radius: 20px;
        }

        .corner.top-right {
            top: -2px;
            right: -2px;
            border-top-width: 4px;
            border-right-width: 4px;
            border-top-right-radius: 20px;
        }

        .corner.bottom-left {
            bottom: -2px;
            left: -2px;
            border-bottom-width: 4px;
            border-left-width: 4px;
            border-bottom-left-radius: 20px;
        }

        .corner.bottom-right {
            bottom: -2px;
            right: -2px;
            border-bottom-width: 4px;
            border-right-width: 4px;
            border-bottom-right-radius: 20px;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            top: 0;
            animation: scanMove 2s linear infinite;
            box-shadow: 0 0 10px #00d4ff;
        }

        @keyframes scanMove {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes scanPulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.5; }
        }

        .controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 30px 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:active {
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.2);
        }

        .result-panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: rgba(20, 20, 20, 0.98);
            backdrop-filter: blur(20px);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 25px;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            max-height: 50vh;
            overflow-y: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-panel.active {
            bottom: 0;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #00d4ff;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .result-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #e0e0e0;
            margin-bottom: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-btn {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .action-btn.copy {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        .action-btn.open {
            background: rgba(123, 44, 191, 0.2);
            color: #b388ff;
        }

        .action-btn.share {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .permission-denied {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 20px;
            display: none;
        }

        .permission-denied.show {
            display: block;
        }

        .permission-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .torch-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .torch-btn.active {
            background: rgba(255, 215, 0, 0.3);
            color: #ffd700;
        }

        .scan-history {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 20;
            backdrop-filter: blur(10px);
        }

        .history-panel {
            position: fixed;
            top: 0;
            left: -100%;
            width: 80%;
            max-width: 350px;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px);
            z-index: 200;
            transition: left 0.3s ease;
            padding: 20px;
            overflow-y: auto;
        }

        .history-panel.active {
            left: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .history-time {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 5px;
        }

        .history-text {
            font-size: 0.9rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .overlay-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay-backdrop.active {
            opacity: 1;
            pointer-events: all;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .vibrate {
            animation: vibrate 0.3s linear;
        }

        @keyframes vibrate {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QR Scanner Pro</h1>
            <div class="subtitle">Point camera at QR code</div>
        </div>

        <div class="scanner-container">
            <div id="reader"></div>
            
            <div class="scanner-overlay">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
                <div class="scan-line"></div>
            </div>

            <button class="torch-btn" id="torchBtn" onclick="toggleTorch()">🔦</button>
            <button class="scan-history" id="historyBtn" onclick="toggleHistory()">📋 <span id="scanCount">0</span></button>

            <div class="permission-denied" id="permissionDenied">
                <div class="permission-icon">📷</div>
                <h2>Camera Access Required</h2>
                <p style="color: #888; margin: 10px 0;">Please allow camera access to scan QR codes</p>
                <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 20px;">Retry</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="toggleScanning()" id="scanBtn">
                <span id="scanBtnText">Stop Scanning</span>
            </button>
            <button class="btn" onclick="document.getElementById('fileInput').click()">
                📁 Upload Image
            </button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
        </div>
    </div>

    <div class="result-panel" id="resultPanel">
        <div class="result-header">
            <div class="result-title">✅ Code Detected</div>
            <button class="close-btn" onclick="closeResult()">×</button>
        </div>
        <div class="result-content" id="resultContent"></div>
        <div class="action-buttons">
            <button class="action-btn copy" onclick="copyResult()">📋 Copy</button>
            <button class="action-btn open" onclick="openResult()">🔗 Open</button>
            <button class="action-btn share" onclick="shareResult()" style="grid-column: span 2;">📤 Share</button>
        </div>
    </div>

    <div class="overlay-backdrop" id="backdrop" onclick="closeAllPanels()"></div>

    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h2>Scan History</h2>
            <button class="close-btn" onclick="toggleHistory()">×</button>
        </div>
        <div id="historyList"></div>
        <button class="btn" onclick="clearHistory()" style="margin-top: 20px; width: 100%;">Clear History</button>
    </div>

    <script>
        let html5QrCode;
        let isScanning = false;
        let currentResult = '';
        let scanHistory = JSON.parse(localStorage.getItem('qrScanHistory') || '[]');
        let torchEnabled = false;

        // Initialize scanner
        async function initScanner() {
            try {
                html5QrCode = new Html5Qrcode("reader");
                const devices = await Html5Qrcode.getCameras();
                
                if (devices && devices.length) {
                    const backCamera = devices.find(device => device.label.toLowerCase().includes('back')) || devices[0];
                    await startScanning(backCamera.id);
                } else {
                    showPermissionDenied();
                }
            } catch (err) {
                console.error("Error initializing scanner:", err);
                showPermissionDenied();
            }
        }

        async function startScanning(cameraId) {
            try {
                await html5QrCode.start(
                    cameraId,
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 },
                        aspectRatio: 1.0
                    },
                    onScanSuccess,
                    onScanFailure
                );
                isScanning = true;
                updateScanButton();
            } catch (err) {
                console.error("Error starting scanner:", err);
                showPermissionDenied();
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (decodedText !== currentResult) {
                currentResult = decodedText;
                
                // Vibrate device
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
                
                // Visual feedback
                document.querySelector('.scanner-overlay').classList.add('vibrate');
                setTimeout(() => {
                    document.querySelector('.scanner-overlay').classList.remove('vibrate');
                }, 300);
                
                showResult(decodedText);
                addToHistory(decodedText);
                
                // Pause scanning briefly
                html5QrCode.pause();
                setTimeout(() => {
                    if (isScanning) html5QrCode.resume();
                }, 2000);
            }
        }

        function onScanFailure(error) {
            // Ignore scan failures (when no QR code is in view)
        }

        function toggleScanning() {
            if (isScanning) {
                html5QrCode.pause();
                isScanning = false;
            } else {
                html5QrCode.resume();
                isScanning = true;
            }
            updateScanButton();
        }

        function updateScanButton() {
            const btnText = document.getElementById('scanBtnText');
            btnText.textContent = isScanning ? 'Stop Scanning' : 'Resume Scanning';
        }

        function showResult(text) {
            document.getElementById('resultContent').textContent = text;
            document.getElementById('resultPanel').classList.add('active');
            document.getElementById('backdrop').classList.add('active');
        }

        function closeResult() {
            document.getElementById('resultPanel').classList.remove('active');
            document.getElementById('backdrop').classList.remove('active');
            currentResult = '';
            if (isScanning) html5QrCode.resume();
        }

        function copyResult() {
            navigator.clipboard.writeText(currentResult).then(() => {
                showToast('Copied to clipboard!');
            });
        }

        function openResult() {
            let url = currentResult;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            window.open(url, '_blank');
        }

        async function shareResult() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Scanned QR Code',
                        text: currentResult
                    });
                } catch (err) {
                    console.log('Share canceled');
                }
            } else {
                copyResult();
            }
        }

        function addToHistory(text) {
            const item = {
                text: text,
                time: new Date().toISOString()
            };
            scanHistory.unshift(item);
            if (scanHistory.length > 50) scanHistory.pop();
            localStorage.setItem('qrScanHistory', JSON.stringify(scanHistory));
            updateHistoryCount();
        }

        function updateHistoryCount() {
            document.getElementById('scanCount').textContent = scanHistory.length;
        }

        function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            const backdrop = document.getElementById('backdrop');
            
            if (panel.classList.contains('active')) {
                panel.classList.remove('active');
                backdrop.classList.remove('active');
            } else {
                renderHistory();
                panel.classList.add('active');
                backdrop.classList.add('active');
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (scanHistory.length === 0) {
                list.innerHTML = '<div class="empty-state">No scans yet</div>';
                return;
            }
            
            list.innerHTML = scanHistory.map((item, index) => `
                <div class="history-item" onclick="loadFromHistory(${index})">
                    <div class="history-time">${new Date(item.time).toLocaleString()}</div>
                    <div class="history-text">${item.text}</div>
                </div>
            `).join('');
        }

        function loadFromHistory(index) {
            currentResult = scanHistory[index].text;
            showResult(currentResult);
            toggleHistory();
        }

        function clearHistory() {
            scanHistory = [];
            localStorage.removeItem('qrScanHistory');
            renderHistory();
            updateHistoryCount();
        }

        function closeAllPanels() {
            document.getElementById('resultPanel').classList.remove('active');
            document.getElementById('historyPanel').classList.remove('active');
            document.getElementById('backdrop').classList.remove('active');
            if (isScanning) html5QrCode.resume();
        }

        function showPermissionDenied() {
            document.getElementById('permissionDenied').classList.add('show');
        }

        async function toggleTorch() {
            // Note: Torch control requires specific camera capabilities
            // This is a placeholder for devices that support it
            torchEnabled = !torchEnabled;
            const btn = document.getElementById('torchBtn');
            btn.classList.toggle('active', torchEnabled);
            showToast(torchEnabled ? 'Torch: ON' : 'Torch: OFF');
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("reader");
                }
                
                const result = await html5QrCode.scanFile(file, true);
                currentResult = result;
                showResult(result);
                addToHistory(result);
            } catch (err) {
                showToast('No QR code found in image');
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.9);
                color: #fff;
                padding: 12px 24px;
                border-radius: 25px;
                font-size: 0.9rem;
                z-index: 1000;
                animation: fadeIn 0.3s;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Initialize on load
        window.addEventListener('load', initScanner);
        
        // Update history count on load
        updateHistoryCount();
    </script>
</body>
</html>
