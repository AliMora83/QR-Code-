<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>QR Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #fff;
        }

        .container {
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for mobile */
            width: 100vw;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            padding-top: max(15px, env(safe-area-inset-top));
            text-align: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 3px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 0.8rem;
            color: #aaa;
        }

        .scanner-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #reader {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Hide default html5-qrcode elements */
        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }

        #reader__dashboard_section_csr span {
            display: none !important;
        }

        #reader__dashboard_section_swaplink {
            display: none !important;
        }

        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65vw;
            height: 65vw;
            max-width: 300px;
            max-height: 300px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .corner {
            position: absolute;
            width: 25px;
            height: 25px;
            border-color: #00d4ff;
            border-style: solid;
            border-width: 0;
        }

        .corner.top-left {
            top: -2px;
            left: -2px;
            border-top-width: 3px;
            border-left-width: 3px;
            border-top-left-radius: 20px;
        }

        .corner.top-right {
            top: -2px;
            right: -2px;
            border-top-width: 3px;
            border-right-width: 3px;
            border-top-right-radius: 20px;
        }

        .corner.bottom-left {
            bottom: -2px;
            left: -2px;
            border-bottom-width: 3px;
            border-left-width: 3px;
            border-bottom-left-radius: 20px;
        }

        .corner.bottom-right {
            bottom: -2px;
            right: -2px;
            border-bottom-width: 3px;
            border-right-width: 3px;
            border-bottom-right-radius: 20px;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            top: 0;
            animation: scanMove 2s linear infinite;
            box-shadow: 0 0 10px #00d4ff;
        }

        @keyframes scanMove {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
            display: flex;
            flex-direction: row;
            gap: 10px;
            z-index: 10;
            align-items: center;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 1;
            max-width: 150px;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 50%;
            flex: 0 0 44px;
        }

        .top-controls {
            position: absolute;
            top: max(60px, env(safe-area-inset-top));
            left: 0;
            right: 0;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            z-index: 20;
            pointer-events: none;
        }

        .top-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .top-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }

        .top-btn.active {
            background: rgba(255, 215, 0, 0.4);
            color: #ffd700;
            border-color: #ffd700;
        }

        .history-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #00d4ff;
            color: #000;
            font-size: 0.65rem;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            max-height: 60vh;
            overflow-y: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-panel.active {
            bottom: 0;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 1rem;
            font-weight: 700;
            color: #00d4ff;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .result-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #e0e0e0;
            margin-bottom: 15px;
            max-height: 120px;
            overflow-y: auto;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .action-btn {
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .action-btn.copy {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        .action-btn.open {
            background: rgba(123, 44, 191, 0.2);
            color: #b388ff;
        }

        .action-btn.share {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .permission-denied {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 20px;
            display: none;
            width: 90%;
            max-width: 300px;
        }

        .permission-denied.show {
            display: block;
        }

        .permission-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .history-panel {
            position: fixed;
            top: 0;
            left: -100%;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px);
            z-index: 200;
            transition: left 0.3s ease;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            overflow-y: auto;
        }

        .history-panel.active {
            left: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .history-time {
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 4px;
        }

        .history-text {
            font-size: 0.85rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .overlay-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay-backdrop.active {
            opacity: 1;
            pointer-events: all;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 0.9rem;
        }

        .vibrate {
            animation: vibrate 0.3s linear;
        }

        @keyframes vibrate {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 1000;
            animation: fadeIn 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Hide file input */
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QR Scanner Pro</h1>
            <div class="subtitle">Point camera at QR code</div>
        </div>

        <div class="scanner-container">
            <div id="reader"></div>
            
            <div class="scanner-overlay" id="scannerOverlay">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
                <div class="scan-line"></div>
            </div>

            <div class="top-controls">
                <button class="top-btn" id="historyBtn" onclick="toggleHistory()">
                    📋
                    <span class="history-badge" id="scanCount" style="display: none;">0</span>
                </button>
                <button class="top-btn" id="torchBtn" onclick="toggleTorch()">🔦</button>
            </div>

            <div class="permission-denied" id="permissionDenied">
                <div class="permission-icon">📷</div>
                <h3 style="margin-bottom: 10px;">Camera Access Required</h3>
                <p style="color: #888; font-size: 0.9rem; line-height: 1.4;">Please allow camera access to scan QR codes</p>
                <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 20px; width: 100%;">Retry</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="toggleScanning()" id="scanBtn">
                <span id="scanBtnText">⏸ Pause</span>
            </button>
            <button class="btn" onclick="document.getElementById('fileInput').click()">
                📁 Gallery
            </button>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
        </div>
    </div>

    <div class="result-panel" id="resultPanel">
        <div class="result-header">
            <div class="result-title">✅ Code Detected</div>
            <button class="close-btn" onclick="closeResult()">×</button>
        </div>
        <div class="result-content" id="resultContent"></div>
        <div class="action-buttons">
            <button class="action-btn copy" onclick="copyResult()">📋 Copy</button>
            <button class="action-btn open" onclick="openResult()">🔗 Open</button>
            <button class="action-btn share" onclick="shareResult()" style="grid-column: span 2;">📤 Share</button>
        </div>
    </div>

    <div class="overlay-backdrop" id="backdrop" onclick="closeAllPanels()"></div>

    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h2 style="font-size: 1.1rem;">Scan History</h2>
            <button class="close-btn" onclick="toggleHistory()">×</button>
        </div>
        <div id="historyList"></div>
        <button class="btn" onclick="clearHistory()" style="margin-top: 15px; width: 100%;">Clear All</button>
    </div>

    <script>
        let html5QrCode;
        let isScanning = true;
        let currentResult = '';
        let scanHistory = JSON.parse(localStorage.getItem('qrScanHistory') || '[]');
        let torchEnabled = false;
        let currentCameraId = null;
        let stream = null;

        // Initialize scanner
        async function initScanner() {
            try {
                html5QrCode = new Html5Qrcode("reader");
                const devices = await Html5Qrcode.getCameras();
                
                if (devices && devices.length) {
                    // Prefer back camera
                    const backCamera = devices.find(device => 
                        device.label.toLowerCase().includes('back') || 
                        device.label.toLowerCase().includes('rear') ||
                        device.label.toLowerCase().includes('environment')
                    ) || devices[0];
                    
                    currentCameraId = backCamera.id;
                    await startScanning(backCamera.id);
                } else {
                    showPermissionDenied();
                }
            } catch (err) {
                console.error("Error initializing scanner:", err);
                showPermissionDenied();
            }
        }

        async function startScanning(cameraId) {
            try {
                const config = {
                    fps: 10,
                    qrbox: { width: 200, height: 200 },
                    aspectRatio: 1.0,
                    videoConstraints: {
                        deviceId: { exact: cameraId },
                        facingMode: "environment"
                    }
                };

                await html5QrCode.start(
                    cameraId,
                    config,
                    onScanSuccess,
                    onScanFailure
                );
                
                isScanning = true;
                updateScanButton();
                
                // Try to get the video stream for torch control
                setTimeout(setupTorch, 1000);
                
            } catch (err) {
                console.error("Error starting scanner:", err);
                // Try without exact deviceId constraint
                try {
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: { width: 200, height: 200 } },
                        onScanSuccess,
                        onScanFailure
                    );
                    isScanning = true;
                    updateScanButton();
                    setTimeout(setupTorch, 1000);
                } catch (err2) {
                    showPermissionDenied();
                }
            }
        }

        function setupTorch() {
            // Get the video element created by html5-qrcode
            const video = document.querySelector('#reader video');
            if (video && video.srcObject) {
                stream = video.srcObject;
            }
        }

        async function toggleTorch() {
            const btn = document.getElementById('torchBtn');
            
            try {
                // Method 1: Using ImageCapture if available
                const video = document.querySelector('#reader video');
                if (video && video.srcObject) {
                    const track = video.srcObject.getVideoTracks()[0];
                    
                    if (track) {
                        const capabilities = track.getCapabilities();
                        
                        if (capabilities.torch) {
                            torchEnabled = !torchEnabled;
                            await track.applyConstraints({
                                advanced: [{ torch: torchEnabled }]
                            });
                            btn.classList.toggle('active', torchEnabled);
                            showToast(torchEnabled ? '🔦 Flash ON' : '🔦 Flash OFF');
                            return;
                        }
                    }
                }
                
                // Method 2: Try using ImageCapture API
                if (typeof ImageCapture !== 'undefined') {
                    const track = stream.getVideoTracks()[0];
                    const imageCapture = new ImageCapture(track);
                    const photoCapabilities = await imageCapture.getPhotoCapabilities();
                    
                    if (photoCapabilities.fillLightMode.includes('flash')) {
                        torchEnabled = !torchEnabled;
                        await imageCapture.setOptions({
                            fillLightMode: torchEnabled ? 'flash' : 'off'
                        });
                        btn.classList.toggle('active', torchEnabled);
                        showToast(torchEnabled ? '🔦 Flash ON' : '🔦 Flash OFF');
                        return;
                    }
                }
                
                showToast('⚠️ Flash not supported on this device');
                
            } catch (err) {
                console.error('Torch error:', err);
                showToast('⚠️ Cannot control flash');
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (decodedText !== currentResult) {
                currentResult = decodedText;
                
                // Vibrate device
                if (navigator.vibrate) {
                    navigator.vibrate([50, 100, 50]);
                }
                
                // Visual feedback
                const overlay = document.getElementById('scannerOverlay');
                overlay.classList.add('vibrate');
                setTimeout(() => overlay.classList.remove('vibrate'), 300);
                
                showResult(decodedText);
                addToHistory(decodedText);
                
                // Pause scanning briefly
                html5QrCode.pause();
                isScanning = false;
                updateScanButton();
            }
        }

        function onScanFailure(error) {
            // Ignore scan failures
        }

        function toggleScanning() {
            if (!html5QrCode) return;
            
            if (isScanning) {
                html5QrCode.pause();
                isScanning = false;
            } else {
                html5QrCode.resume();
                isScanning = true;
                currentResult = ''; // Reset to allow rescanning same code
            }
            updateScanButton();
        }

        function updateScanButton() {
            const btnText = document.getElementById('scanBtnText');
            btnText.textContent = isScanning ? '⏸ Pause' : '▶ Resume';
        }

        function showResult(text) {
            document.getElementById('resultContent').textContent = text;
            document.getElementById('resultPanel').classList.add('active');
            document.getElementById('backdrop').classList.add('active');
        }

        function closeResult() {
            document.getElementById('resultPanel').classList.remove('active');
            document.getElementById('backdrop').classList.remove('active');
            currentResult = '';
            if (!isScanning) {
                toggleScanning(); // Auto-resume
            }
        }

        function copyResult() {
            navigator.clipboard.writeText(currentResult).then(() => {
                showToast('✅ Copied!');
            }).catch(() => {
                // Fallback
                const textArea = document.createElement("textarea");
                textArea.value = currentResult;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('✅ Copied!');
            });
        }

        function openResult() {
            let url = currentResult.trim();
            if (!url.match(/^https?:\/\//i)) {
                if (url.includes('.') && !url.includes(' ')) {
                    url = 'https://' + url;
                } else {
                    showToast('Not a valid URL');
                    return;
                }
            }
            window.open(url, '_blank');
        }

        async function shareResult() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Scanned QR Code',
                        text: currentResult
                    });
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        copyResult();
                    }
                }
            } else {
                copyResult();
            }
        }

        function addToHistory(text) {
            const item = {
                text: text,
                time: new Date().toISOString()
            };
            scanHistory.unshift(item);
            if (scanHistory.length > 50) scanHistory.pop();
            localStorage.setItem('qrScanHistory', JSON.stringify(scanHistory));
            updateHistoryCount();
        }

        function updateHistoryCount() {
            const badge = document.getElementById('scanCount');
            const count = scanHistory.length;
            badge.textContent = count;
            badge.style.display = count > 0 ? 'flex' : 'none';
        }

        function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            const backdrop = document.getElementById('backdrop');
            
            if (panel.classList.contains('active')) {
                panel.classList.remove('active');
                backdrop.classList.remove('active');
            } else {
                renderHistory();
                panel.classList.add('active');
                backdrop.classList.add('active');
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (scanHistory.length === 0) {
                list.innerHTML = '<div class="empty-state">No scans yet</div>';
                return;
            }
            
            list.innerHTML = scanHistory.map((item, index) => {
                const date = new Date(item.time);
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                
                return `
                    <div class="history-item" onclick="loadFromHistory(${index})">
                        <div class="history-time">${dateStr} • ${timeStr}</div>
                        <div class="history-text">${item.text}</div>
                    </div>
                `;
            }).join('');
        }

        function loadFromHistory(index) {
            currentResult = scanHistory[index].text;
            showResult(currentResult);
            toggleHistory();
        }

        function clearHistory() {
            if (confirm('Clear all scan history?')) {
                scanHistory = [];
                localStorage.removeItem('qrScanHistory');
                renderHistory();
                updateHistoryCount();
            }
        }

        function closeAllPanels() {
            document.getElementById('resultPanel').classList.remove('active');
            document.getElementById('historyPanel').classList.remove('active');
            document.getElementById('backdrop').classList.remove('active');
        }

        function showPermissionDenied() {
            document.getElementById('permissionDenied').classList.add('show');
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("reader");
                }
                
                // Stop camera if running
                if (isScanning) {
                    await html5QrCode.stop();
                }
                
                const result = await html5QrCode.scanFile(file, true);
                currentResult = result;
                showResult(result);
                addToHistory(result);
                
                // Restart camera
                await startScanning(currentCameraId);
                
            } catch (err) {
                showToast('❌ No QR code found');
                // Restart camera if it was stopped
                if (!isScanning) {
                    await startScanning(currentCameraId);
                }
            }
            
            // Reset input
            event.target.value = '';
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // Handle visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && html5QrCode && isScanning) {
                html5QrCode.pause();
            } else if (!document.hidden && html5QrCode && !document.getElementById('resultPanel').classList.contains('active')) {
                html5QrCode.resume();
            }
        });

        // Initialize
        window.addEventListener('load', initScanner);
        updateHistoryCount();
    </script>
</body>
</html>
